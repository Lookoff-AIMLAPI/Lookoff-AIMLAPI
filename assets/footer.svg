<svg xmlns="http://www.w3.org/2000/svg" width="760" height="76" viewBox="0 0 760 76" role="img" aria-label="Current mode: turning coffee into APIs, EET and EEST timezone. Work: aimlapi.com. Contact: stan@aimlapi.com">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop class="a0" offset="0%" stop-color="#79A49A"/>
      <stop class="a1" offset="50%" stop-color="#6F9565"/>
      <stop class="a2" offset="100%" stop-color="#C8A95F"/>
    </linearGradient>
    <style>
      .a0{animation:c0 4.2s ease-in-out infinite}.a1{animation:c1 4.2s ease-in-out infinite}.a2{animation:c2 4.2s ease-in-out infinite}
      .cursor{animation:blink 1.15s steps(1,end) infinite}
      @keyframes c0{0%,100%{stop-color:#79A49A}50%{stop-color:#C8A95F}}@keyframes c1{0%,100%{stop-color:#6F9565}50%{stop-color:#79A49A}}@keyframes c2{0%,100%{stop-color:#C8A95F}50%{stop-color:#6F9565}}
      @keyframes blink{0%,46%{opacity:1}47%,100%{opacity:0}}
      @media (prefers-reduced-motion:reduce){.a0,.a1,.a2,.cursor{animation:none}}
    </style>
  </defs>

  <!-- CURRENT MODE -->
  <g>
    <rect x="0.5" y="0.5" width="375" height="75" rx="10" fill="#0D1117" stroke="#21262D"/>
    <rect x="0" y="8" width="3" height="60" rx="1.5" fill="url(#accent)"/>
    <text x="24" y="25" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1.5" fill="#6E7681">CURRENT MODE</text>
    <text x="352" y="25" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1.3" fill="#6E7681" text-anchor="end">EET / EEST</text>
    <text x="24" y="53" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#EEEDDA">turning coffee into APIs<tspan class="cursor" fill="#6F9565"> ▮</tspan></text>
  </g>

  <!-- WORK -->
  <g transform="translate(380,0)">
    <rect x="0.5" y="0.5" width="149" height="75" rx="10" fill="#0D1117" stroke="#21262D"/>
    <text x="18" y="25" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1.5" fill="#6E7681">WORK</text>
    <text x="18" y="53" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="0.5" fill="#C8A95F">AIMLAPI.COM ↗</text>
  </g>

  <!-- CONTACT -->
  <g transform="translate(534,0)">
    <rect x="0.5" y="0.5" width="225" height="75" rx="10" fill="#0D1117" stroke="#21262D"/>
    <text x="18" y="25" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1.5" fill="#6E7681">CONTACT</text>
    <text x="18" y="53" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="0.35" fill="#C8A95F">STAN@AIMLAPI.COM ↗</text>
  </g>
</svg>
