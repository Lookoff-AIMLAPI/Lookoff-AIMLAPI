<svg xmlns="http://www.w3.org/2000/svg" width="760" height="86" viewBox="0 0 760 86" role="img" aria-label="Turning coffee into APIs. EET and EEST timezone.">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop class="a0" offset="0%" stop-color="#5EEAD4"/>
      <stop class="a1" offset="50%" stop-color="#34D399"/>
      <stop class="a2" offset="100%" stop-color="#C7D22B"/>
    </linearGradient>
    <style>
      .a0{animation:c0 4.2s ease-in-out infinite}
      .a1{animation:c1 4.2s ease-in-out infinite}
      .a2{animation:c2 4.2s ease-in-out infinite}
      .cursor{animation:blink 1.15s steps(1,end) infinite}
      @keyframes c0{0%,100%{stop-color:#5EEAD4}50%{stop-color:#C7D22B}}
      @keyframes c1{0%,100%{stop-color:#34D399}50%{stop-color:#5EEAD4}}
      @keyframes c2{0%,100%{stop-color:#C7D22B}50%{stop-color:#34D399}}
      @keyframes blink{0%,46%{opacity:1}47%,100%{opacity:0}}
      @media (prefers-reduced-motion:reduce){.a0,.a1,.a2,.cursor{animation:none}}
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="85" rx="10" fill="#0D1117" stroke="#21262D"/>
  <rect x="0" y="8" width="3" height="70" rx="1.5" fill="url(#accent)"/>

  <text x="34" y="29" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" letter-spacing="1.6" fill="#6E7681">CURRENT MODE</text>
  <text x="34" y="59" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#E6EDF3">turning coffee into APIs<tspan class="cursor" fill="#34D399"> ▮</tspan></text>
  <text x="726" y="55" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" letter-spacing="1.4" fill="#6E7681" text-anchor="end">EET / EEST</text>
</svg>
