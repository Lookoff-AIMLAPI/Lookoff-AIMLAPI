    <text x="176" y="369">AIMLAPI provider · guided onboarding</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" letter-spacing="1.1" fill="#34D399" text-anchor="end">
    <text x="726" y="338">MERGED PRs</text>
    <text x="726" y="368">MERGED PR</text>
